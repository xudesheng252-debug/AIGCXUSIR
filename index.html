<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AIGCXUSIR - AI时代的视觉创作</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero"><div class="hero-bg"></div><div class="hero-content">
<h1 class="hero-title">AIGCXUSIR</h1>
<p class="hero-subtitle">AI时代 &middot; 视觉创作</p>
<div class="hero-stats" id="heroStats">
<span class="stat-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> <span id="statImages">0</span> 张图片</span>
<span class="stat-divider"></span>
<span class="stat-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg> <span id="statVideos">0</span> 个视频</span>
</div></div>
<div class="scroll-hint"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
</header>
<nav class="filter-bar" id="filterBar">
<button class="filter-btn active" data-filter="all">全部作品</button>
<button class="filter-btn" data-filter="image">图片</button>
<button class="filter-btn" data-filter="video">视频</button>
</nav>
<main class="gallery" id="gallery"></main>

<!-- Password Modal -->
<div class="pwd-modal" id="pwdModal" data-mode="">
  <div class="pwd-modal-box">
    <h3 id="pwdModalTitle">输入上传密码</h3>
    <input type="password" id="pwdInput" placeholder="请输入密码" autocomplete="off">
    <div class="pwd-modal-actions">
      <button class="pwd-btn pwd-cancel" id="pwdCancel">取消</button>
      <button class="pwd-btn pwd-confirm" id="pwdConfirm">确认</button>
    </div>
    <div class="pwd-error" id="pwdError"></div>
  </div>
</div>

<input type="file" id="hiddenFileInput" accept="image/*,video/*" style="display:none">

<div class="upload-progress" id="uploadProgress" style="display:none">
  <div class="upload-progress-box">
    <div class="upload-progress-filename" id="progressFilename"></div>
    <div class="upload-progress-bar-bg"><div class="upload-progress-bar" id="progressBar"></div></div>
    <div class="upload-progress-text" id="progressText">0%</div>
  </div>
</div>

<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lightboxClose"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
<button class="lightbox-prev" id="lightboxPrev"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
<img class="lightbox-img" id="lightboxImg" alt="">
<button class="lightbox-next" id="lightboxNext"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
<div class="lightbox-name" id="lightboxName"></div>
</div>

<footer class="footer"><p>&copy; 2026 AIGCXUSIR &middot; AI时代视觉创作</p></footer>

<script>
var MEDIA = null;
var G=document.getElementById("gallery");
var LB=document.getElementById("lightbox"),LBI=document.getElementById("lightboxImg"),LBN=document.getElementById("lightboxName"),LBC=document.getElementById("lightboxClose"),LBP=document.getElementById("lightboxPrev"),LBNX=document.getElementById("lightboxNext"),LBT=[],LBIX=0;
var PM=document.getElementById("pwdModal"),PMT=document.getElementById("pwdModalTitle"),PI=document.getElementById("pwdInput"),PC=document.getElementById("pwdConfirm"),PCC=document.getElementById("pwdCancel"),PE=document.getElementById("pwdError"),HFI=document.getElementById("hiddenFileInput");
var UP=document.getElementById("uploadProgress"),UPF=document.getElementById("progressFilename"),UPB=document.getElementById("progressBar"),UPT=document.getElementById("progressText");
var pendingUploadPwd = "", pendingDeleteTarget = null;

// 注入CSS隐藏视频控件
(function(){
  var s=document.createElement("style");
  s.textContent="video::-webkit-media-controls-download-button,video::-webkit-media-controls-cast-button,video::-webkit-media-controls-overlay-cast-button,video::-internal-media-controls-cast-button,video::-internal-media-controls-download-button,video::-webkit-media-controls-picture-in-picture-button,video::-webkit-media-controls-toggle-closed-captions-button{display:none!important;width:0!important;height:0!important;opacity:0!important;pointer-events:none!important}";
  document.head.appendChild(s);
})();

function render(f){
  var items = f==="all"?MEDIA:MEDIA.filter(function(m){return m.type===f;});
  G.innerHTML="";
  if(items.length===0){
    G.innerHTML="<div class=\"gallery-empty\">暂无作品</div>";
  } else {
    items.forEach(function(it,i){
      var c=document.createElement("div");c.className="gallery-card";
      var v=it.type==="video";var n=it.file.replace(/\.[^.]+$/, "");var u="media/"+encodeURI(it.file);
      var b=v?"<svg width=14 height=14 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2><polygon points=\"5 3 19 12 5 21 5 3\"/></svg>":"<svg width=14 height=14 viewBox=\"0 0 24 24\" fill=none stroke=currentColor stroke-width=2><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><path d=m21 15-5-5L5 21/></svg>";
      var mt=v?'<video src="'+u+'" muted loop preload="metadata" playsinline disablePictureInPicture controlsList="nodownload" disableRemotePlayback webkit-playsinline></video>':'<img src="'+u+'" alt="" loading="lazy">';
      var mn=it.file;
      c.innerHTML='<div class="card-badge">'+b+'</div>'+mt+'<div class="card-overlay"><div class="card-name">'+n+'</div></div>'+
        '<button class="card-more" title="更多选项"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>'+
        '<div class="card-menu">'+
          '<button class="card-dl" data-url="'+u+'" data-name="'+mn+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载</button>'+
          '<button class="card-del" data-file="'+it.file+'" data-name="'+n+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 删除</button>'+
        '</div>';
      c.addEventListener("click",function(e){
        if(e.target.closest(".card-more,.card-menu"))return;
        var q=this.querySelector("video");
        if(q){
          if(q.paused){q.play();q.controls=true;}else{q.pause();}
        } else {
          var imgIdx = items.findIndex(function(m){return m.type==="image" && m.file===it.file});
          if(imgIdx>=0)openLightbox(items[imgIdx],items);
        }
      });
      if(v){var vd=c.querySelector("video");c.addEventListener("mouseenter",function(){vd.play()});c.addEventListener("mouseleave",function(){vd.pause();vd.currentTime=0})}
      G.appendChild(c);
    });
  }
  // "+" 上传卡片
  var uc=document.createElement("div");uc.className="gallery-card upload-card";
  uc.innerHTML='<div class="upload-card-inner"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>上传作品</span></div>';
  uc.addEventListener("click",function(){showUploadPwdModal()});
  G.appendChild(uc);

  // 更多选项按钮 - 打开/关闭菜单
  document.querySelectorAll(".card-more").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();var m=this.nextElementSibling;m.classList.toggle("open");});
  });
  // 下载按钮 - 用 fetch + blob 方式确保跨浏览器兼容
  document.querySelectorAll(".card-dl").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();
      var me=this,url=me.dataset.url,name=me.dataset.name;
      fetch(url).then(function(r){return r.blob()}).then(function(b){
        var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;
        document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href)},1000);
      }).catch(function(){window.open(url,"_blank")});
      me.closest(".card-menu").classList.remove("open");
    });
  });
  // 删除按钮
  document.querySelectorAll(".card-del").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();
      this.closest(".card-menu").classList.remove("open");
      pendingDeleteTarget = this.dataset.file;
      showDeletePwdModal(this.dataset.name);
    });
  });
  // 点击菜单外关闭
  document.addEventListener("click",function(e){
    if(!e.target.closest(".card-menu")){
      document.querySelectorAll(".card-menu.open").forEach(function(m){m.classList.remove("open")});
    }
  });
}

// 筛选
document.querySelectorAll(".filter-btn").forEach(function(b){b.addEventListener("click",function(){
  document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active")});b.classList.add("active");render(b.dataset.filter);
})});

// 灯箱
function openLightbox(it,items){
  LBT=items.filter(function(i){return i.type==="image"});
  LBIX=Math.max(0,LBT.findIndex(function(i){return i.file===it.file}));
  if(LBT.length===0)return;updateLB();LB.classList.add("open");document.body.style.overflow="hidden";
}
function updateLB(){
  var it=LBT[LBIX];if(!it)return;
  LBI.src="media/"+encodeURI(it.file);
  LBN.textContent=it.file.replace(/\.[^.]+$/, "");
  LBP.style.display=LBT.length>1?"flex":"none";LBNX.style.display=LBT.length>1?"flex":"none";
}
LBC.onclick=function(){LB.classList.remove("open");document.body.style.overflow=""};
LBP.onclick=function(){LBIX=(LBIX-1+LBT.length)%LBT.length;updateLB()};
LBNX.onclick=function(){LBIX=(LBIX+1)%LBT.length;updateLB()};
document.addEventListener("keydown",function(e){
  if(!LB.classList.contains("open"))return;
  if(e.key==="Escape")LBC.click();if(e.key==="ArrowLeft")LBP.click();if(e.key==="ArrowRight")LBNX.click();
});
LB.addEventListener("click",function(e){if(e.target===LB)LBC.click()});

// 密码弹窗
function resetModal(){PM.className="pwd-modal";PE.textContent="";PI.value="";PM.dataset.mode="";}
function showUploadPwdModal(){resetModal();PMT.textContent="输入上传密码";PM.classList.add("open");PM.dataset.mode="upload";PI.focus();}
function showDeletePwdModal(name){resetModal();PMT.textContent="输入密码以删除";PM.classList.add("open");PM.dataset.mode="delete";PI.focus();}
function closePwdModal(){resetModal();}
PCC.addEventListener("click",closePwdModal);
PI.addEventListener("keydown",function(e){if(e.key==="Enter")PC.click()});
PC.addEventListener("click",function(){
  var pwd=PI.value.trim();
  if(!pwd){PE.textContent="请输入密码";return;}
  var mode=PM.dataset.mode;
  PE.textContent="验证中...";
  fetch("/api/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pwd})})
  .then(function(r){
    if(r.status===401){PE.textContent="密码错误";throw new Error("wrong");}
    return r.json();
  })
  .then(function(d){
    closePwdModal();
    if(mode==="upload"){
      pendingUploadPwd = pwd;
      setTimeout(function(){HFI.click()},300);
    } else if(mode==="delete"){
      doDelete(pwd);
    }
  })
  .catch(function(e){if(e.message!=="wrong"){PE.textContent="验证失败，请重试"}});
});

// 删除
function doDelete(pwd){
  var fn = pendingDeleteTarget;pendingDeleteTarget=null;if(!fn){alert("未指定删除文件");return;}
  fetch("/api/delete",{method:"POST",headers:{"Content-Type":"application/json","x-upload-password":pwd},body:JSON.stringify({file:fn})})
  .then(function(r){return r.json().then(function(d){return{status:r.status,data:d}})})
  .then(function(res){
    if(res.status===401){alert("密码错误");return;}
    if(res.data.error){alert(res.data.error);return;}
    fetch("/api/media").then(function(r){return r.json()}).then(function(d){
      MEDIA=d;updateStats();render(document.querySelector(".filter-btn.active").dataset.filter);
    });
  })
  .catch(function(){alert("删除失败");});
}

// 上传
HFI.addEventListener("change",function(){
  if(!this.files.length)return;
  var file=this.files[0];
  var fd=new FormData();fd.append("file",file);
  UPF.textContent=file.name;
  UPB.style.width="0%";UPT.textContent="0%";
  UP.style.display="flex";
  var xhr=new XMLHttpRequest();
  xhr.upload.addEventListener("progress",function(e){
    if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);UPB.style.width=p+"%";UPT.textContent=p+"%";}
  });
  xhr.addEventListener("load",function(){
    UP.style.display="none";
    if(xhr.status===401){alert("密码已过期");return;}
    try{var d=JSON.parse(xhr.responseText);if(d.error){alert(d.error);return;}}catch(e){}
    fetch("/api/media").then(function(r){return r.json()}).then(function(d){
      MEDIA=d;updateStats();render(document.querySelector(".filter-btn.active").dataset.filter);
    });
  });
  xhr.addEventListener("error",function(){UP.style.display="none";alert("上传失败");});
  xhr.open("POST","/api/upload");
  xhr.setRequestHeader("x-upload-password",pendingUploadPwd);
  xhr.send(fd);
  this.value="";
});

// 回到顶部
var ST=document.createElement("button");ST.className="scroll-top";ST.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"/></svg>';
ST.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"})});
document.body.appendChild(ST);
window.addEventListener("scroll",function(){if(window.scrollY>300){ST.classList.add("visible")}else{ST.classList.remove("visible")}});

function updateStats(){
  document.getElementById("statImages").textContent=MEDIA.filter(function(m){return m.type==="image"}).length;
  document.getElementById("statVideos").textContent=MEDIA.filter(function(m){return m.type==="video"}).length;
}

fetch("/api/media").then(function(r){return r.json()}).then(function(d){
  MEDIA=d;updateStats();render("all");
});
</script>
</body>
</html>
